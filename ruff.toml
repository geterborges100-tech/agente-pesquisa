target-version = "py310"
line-length = 120

[lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "SIM"]
ignore = ["E501", "B008"]

exclude = [
    "_referencia",
    "app/routers/webhooks_router.py",
    "app/services/webhooks_router.py",
    ".venv",
    "__pycache__",
    ".git",
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
exclude = ["_referencia", ".venv", "__pycache__", ".git"]
