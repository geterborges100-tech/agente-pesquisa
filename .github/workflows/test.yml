name: Lint and Test

on:
  push:
    branches: [ main, fix/*, feat/*, chore/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: xXBKYkUMhVLDdEbjrCbxqtIbG8OgrKiV
          POSTGRES_DB: research_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest
      - name: Lint with Ruff
        run: ruff check app/ --fix
      - name: Test with pytest
        run: pytest tests/ -v
        env:
          DATABASE_URL: postgresql+psycopg2://agent:xXBKYkUMhVLDdEbjrCbxqtIbG8OgrKiV@localhost:5432/research_agent
