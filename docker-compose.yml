services:
  db:
    image: postgres:15-alpine
    container_name: research_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: xXBKYkUMhVLDdEbjrCbxqtIbG8OgrKiV
      POSTGRES_DB: research_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d research_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: agente-pesquisa-api
    container_name: research_agent_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips="*"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:

networks:
  default:
    name: research_agent_network
