services:
  db:
    image: postgres:15-alpine
    container_name: research_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: xXBKYkUMhVLDdEbjrCbxqtIbG8OgrKiV
      POSTGRES_DB: research_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: research_agent_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
