services:
  db:
    image: postgres:15-alpine
    container_name: research_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: xXBKYkUMhVLDdEbjrCbxqtIbG8OgrKiV
      POSTGRES_DB: research_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: research_agent_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  evolution:
    image: cesarlopesmx/evolution-api:2.3.7
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=B6D711FCDE4D4FD5936544120E713976
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://agent:xXBKYkUMhVLDdEbjrCbxqtIbG8OgrKiV@db:5432/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false

volumes:
  pgdata:
